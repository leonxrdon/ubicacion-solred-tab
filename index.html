<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Diagnóstico de ubicación</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 16px; }
    button { padding: 10px 14px; }
    pre { background: #f5f5f5; padding: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Diagnóstico de ubicación</h2>
  <button id="btn">Probar ubicación</button>
  <pre id="log"></pre>

  <script>
    const log = (msg) => {
      const el = document.getElementById("log");
      el.textContent += msg + "\n";
      console.log(msg);
    };

    async function run() {
      log("URL: " + location.href);
      log("isSecureContext: " + window.isSecureContext);
      log("navigator.geolocation existe: " + !!navigator.geolocation);

      if (!window.isSecureContext) {
        log("ERROR: no es un contexto seguro (HTTPS obligatorio).");
        return;
      }

      if (!navigator.geolocation) {
        log("ERROR: navigator.geolocation no está disponible.");
        return;
      }

      try {
        if (navigator.permissions && navigator.permissions.query) {
          const status = await navigator.permissions.query({ name: "geolocation" });
          log("permissions.query geolocation: " + status.state);
          status.onchange = () => log("permiso cambió a: " + status.state);
        } else {
          log("permissions.query no disponible.");
        }
      } catch (e) {
        log("No se pudo consultar permissions API: " + (e.message || e));
      }

      log("Solicitando ubicación...");
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          log("OK");
          log("lat: " + pos.coords.latitude);
          log("lng: " + pos.coords.longitude);
          log("accuracy: " + pos.coords.accuracy);
        },
        (err) => {
          log("ERROR code: " + err.code);
          log("ERROR message: " + err.message);
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    }

    document.getElementById("btn").addEventListener("click", run);
  </script>
</body>
</html>
