<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Captura de ubicación - Teams</title>

  <!-- SDK de Microsoft Teams -->
  <script src="https://res.cdn.office.net/teams-js/2.0.0/js/MicrosoftTeams.min.js"></script>

  <style>
    body {
      font-family: Segoe UI, Arial, sans-serif;
      padding: 16px;
    }
    button {
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
    }
    pre {
      background: #f5f5f5;
      padding: 12px;
      margin-top: 12px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <h3>Ubicación del usuario</h3>
  <button onclick="obtenerUbicacion()">Obtener ubicación</button>

  <pre id="resultado"></pre>

  <script>
    async function initTeams() {
      await microsoftTeams.app.initialize();
    }

    async function obtenerUbicacion() {
      try {
        const location = await microsoftTeams.app.location.getLocation({
          allowChooseLocation: false,
          showMap: false
        });

        document.getElementById("resultado").innerText =
          JSON.stringify(location, null, 2);

      } catch (err) {
        document.getElementById("resultado").innerText =
          "Error obteniendo ubicación:\n" + JSON.stringify(err, null, 2);
      }
    }

    initTeams();
  </script>
</body>
</html>
